*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Inter,sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#3a3a55 0%,#111118 45%,#090909 100%);

    overflow-x:hidden;

    color:white;
}

body::before{

content:"";

position:fixed;

width:600px;
height:600px;

background:#5f7cff33;

filter:blur(150px);

top:-250px;
left:-150px;

pointer-events:none;

}

body::after{

content:"";

position:fixed;

width:500px;
height:500px;

background:#8a5cff22;

filter:blur(160px);

right:-180px;
bottom:-200px;

pointer-events:none;

}

.container{

width:min(420px,92%);

padding:30px;

text-align:center;

}

.profile{

margin-bottom:35px;

}

.profile img{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid rgba(255,255,255,.2);

backdrop-filter:blur(15px);

box-shadow:
0 15px 40px rgba(0,0,0,.5);

}

.profile h1{

margin-top:18px;

font-size:30px;

font-weight:700;

}

.profile p{

margin-top:8px;

opacity:.75;

font-size:15px;

line-height:1.5;

}

.links{

display:flex;

flex-direction:column;

gap:18px;

}

.link{

position:relative;

display:flex;
align-items:center;
justify-content:center;
gap:14px;

padding:20px;

text-decoration:none;
color:#fff;

font-weight:600;
font-size:17px;

border-radius:28px;

/* Vidro mais espesso */
background:
linear-gradient(
180deg,
rgba(255,255,255,.18),
rgba(255,255,255,.06)
);

border:1px solid rgba(255,255,255,.20);

backdrop-filter:
blur(38px)
saturate(220%)
contrast(115%);

-webkit-backdrop-filter:
blur(38px)
saturate(220%)
contrast(115%);

/* Aparência "áspera" */
box-shadow:

0 20px 45px rgba(0,0,0,.45),

inset 0 1px 0 rgba(255,255,255,.45),

inset 0 -3px 12px rgba(255,255,255,.05),

inset 0 0 30px rgba(255,255,255,.03);

transition:
transform .28s cubic-bezier(.2,.8,.2,1),
box-shadow .28s,
background .28s;

overflow:hidden;

}

.link::before{

content:"";

position:absolute;

width:180%;
height:120%;

left:-140%;
top:-10%;

background:
linear-gradient(
110deg,
transparent 25%,
rgba(255,255,255,.45) 45%,
rgba(255,255,255,.15) 52%,
transparent 70%
);

transform:rotate(10deg);

transition:1s;

pointer-events:none;

}

.link:hover::before{

left:120%;

}

.link:hover::before{

left:150%;

}

.link:hover{

transform:
translateY(-6px)
scale(1.09);

background:
linear-gradient(
180deg,
rgba(255,255,255,.24),
rgba(255,255,255,.08)
);

box-shadow:

0 35px 60px rgba(0,0,0,.55),

0 0 25px rgba(255,255,255,.08),

inset 0 2px 0 rgba(255,255,255,.55),

inset 0 -5px 18px rgba(255,255,255,.08);

}
    
.link::after{

content:"";

position:absolute;

inset:0;

border-radius:inherit;

background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,.10), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,255,255,.05), transparent 35%);

mix-blend-mode:screen;

opacity:.75;

pointer-events:none;

}

.link i{

font-size:22px;

width:30px;

}

.footer{

margin-top:35px;

font-size:13px;

opacity:.5;

}

@media(max-width:500px){

.profile img{

width:100px;
height:100px;

}

.profile h1{

font-size:26px;

}

.link{

padding:17px;

font-size:16px;

}
